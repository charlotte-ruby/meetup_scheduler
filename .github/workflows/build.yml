name: Build App

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: debug
        run: |
          gem list
      - name: lint
        run: |
          ./bin/rubocop
      - name: tests
        run: |
          ./bin/rspec
